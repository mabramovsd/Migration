networks:
  default:
    driver: bridge

services:
  # MS SQL Server
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: petproject_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_P@ssw0rd123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - default

  # Agro Service
  agro:
    build:
      context: .
      dockerfile: Migration.Agro/Dockerfile
    container_name: petproject_agro
    depends_on:
      mssql:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__AgroDb=Server=mssql,1433;Database=Migration_Agro;User Id=SA;Password=Your_strong_P@ssw0rd123;Trust Server Certificate=True
    ports:
      - "5002:5002"
    networks:
      - default

  # Shipbuilding Service
  shipbuilding:
    build:
      context: .
      dockerfile: Migration.Shipbuilding/Dockerfile
    container_name: petproject_shipbuilding
    depends_on:
      mssql:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__ShipbuildingDb=Server=mssql,1433;Database=Migration_Shipbuilding;User Id=SA;Password=Your_strong_P@ssw0rd123;Trust Server Certificate=True
    ports:
      - "5001:5001"
    networks:
      - default

  # Web API
  webapi:
    build:
      context: .
      dockerfile: MigrationWeb/Dockerfile
    container_name: petproject_api
    depends_on:
      - mssql
      - agro
      - shipbuilding
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CoreDb=Server=mssql,1433;Database=Migration_Core;User Id=SA;Password=Your_strong_P@ssw0rd123;Trust Server Certificate=True
      - ServiceUrls__Agro=http://agro:5002
      - ServiceUrls__Shipbuilding=http://shipbuilding:5001
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - default

volumes:
  mssql_data:
